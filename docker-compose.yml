services:
  redis:
    image: redis:7-alpine
    container_name: pittrack-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: pittrack-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pittrack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pittrack}
      POSTGRES_DB: ${POSTGRES_DB:-pittrack}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pittrack} -d ${POSTGRES_DB:-pittrack}"]
      interval: 5s
      timeout: 5s
      retries: 5

  ordem-servico-api:
    build:
      context: ./ordem-servico-api
    container_name: pittrack-ordem-servico-api
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL:-postgres://pittrack:pittrack@postgres:5432/pittrack}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      REDIS_STREAM_KEY: ${REDIS_STREAM_KEY:-OSEventos}
      TIMELINE_PROJECTION_URL: ${TIMELINE_PROJECTION_URL:-http://projection:3002}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  projection:
    build:
      context: ./projection
    container_name: pittrack-projection
    ports:
      - "${PROJECTION_PORT:-3002}:3002"
    environment:
      PORT: 3002
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      REDIS_STREAM_KEY: ${REDIS_STREAM_KEY:-OSEventos}
    depends_on:
      redis:
        condition: service_healthy

  ordem-servico-state-manager:
    build:
      context: ./ordem-servico-state-manager
    container_name: pittrack-ordem-servico-state-manager
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://pittrack:pittrack@postgres:5432/pittrack}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      REDIS_STREAM_KEY: ${REDIS_STREAM_KEY:-OSEventos}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  media-service:
    build:
      context: ./media-service
    container_name: pittrack-media-service
    ports:
      - "${MEDIA_PORT:-3003}:3003"
    environment:
      PORT: 3003
      MONGO_URL: ${MONGO_URL:-mongodb://mongo:27017/pittrack-media}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - media-uploads:/app/src/uploads

  mongo:
    image: mongo:7
    container_name: pittrack-mongo
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
    container_name: pittrack-frontend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
      VITE_MEDIA_URL: ${VITE_MEDIA_URL:-http://localhost:3003}
    depends_on:
      - ordem-servico-api

volumes:
  postgres-data:
  redis-data:
  mongo-data:
  media-uploads:
